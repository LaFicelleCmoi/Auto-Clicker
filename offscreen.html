<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Auto-Clicker - Offscreen Audio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: linear-gradient(180deg, #0f0f1a 0%, #0a0a0f 100%);
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 30px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 11px;
      color: #52525b;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .waves {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 4px;
      height: 40px;
    }

    .wave {
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(180deg, #a78bfa, #6366f1);
      animation: wave 1.2s ease-in-out infinite;
    }

    .wave:nth-child(1) { animation-delay: 0s; }
    .wave:nth-child(2) { animation-delay: 0.15s; }
    .wave:nth-child(3) { animation-delay: 0.3s; }
    .wave:nth-child(4) { animation-delay: 0.45s; }
    .wave:nth-child(5) { animation-delay: 0.6s; }

    @keyframes wave {
      0%, 100% { height: 8px; opacity: 0.4; }
      50% { height: 36px; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Auto-Clicker</h1>
    <div class="subtitle">Audio Offscreen</div>
    <div class="waves">
      <span class="wave"></span>
      <span class="wave"></span>
      <span class="wave"></span>
      <span class="wave"></span>
      <span class="wave"></span>
    </div>
  </div>

  <script>
    chrome.runtime.onMessage.addListener((msg) => {
      if (msg.action === "playAlert") {
        // Genere un son d'alerte avec Web Audio API
        const ctx = new AudioContext();

        // Melodie de victoire : 3 notes montantes
        const notes = [523, 659, 784]; // Do, Mi, Sol
        const duration = 0.25;

        notes.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "sine";
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.3, ctx.currentTime + i * duration);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i + 1) * duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * duration);
          osc.stop(ctx.currentTime + (i + 1) * duration);
        });

        // Deuxieme passe plus aigue pour l'effet "shiny"
        setTimeout(() => {
          const notes2 = [784, 988, 1047]; // Sol, Si, Do aigu
          notes2.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.2);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i + 1) * 0.2);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime + i * 0.2);
            osc.stop(ctx.currentTime + (i + 1) * 0.2);
          });
        }, 800);
      }
    });
  </script>
</body>
</html>
