<!DOCTYPE html>
<html>
<body>
<script>
chrome.runtime.onMessage.addListener((msg) => {
  if (msg.action === "playAlert") {
    // Genere un son d'alerte avec Web Audio API
    const ctx = new AudioContext();

    // Melodie de victoire : 3 notes montantes
    const notes = [523, 659, 784]; // Do, Mi, Sol
    const duration = 0.25;

    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * duration);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i + 1) * duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * duration);
      osc.stop(ctx.currentTime + (i + 1) * duration);
    });

    // Deuxieme passe plus aigue pour l'effet "shiny"
    setTimeout(() => {
      const notes2 = [784, 988, 1047]; // Sol, Si, Do aigu
      notes2.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.2);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i + 1) * 0.2);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + i * 0.2);
        osc.stop(ctx.currentTime + (i + 1) * 0.2);
      });
    }, 800);
  }
});
</script>
</body>
</html>
